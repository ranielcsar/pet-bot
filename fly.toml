app = "pet-bot"

primary_region = "gru"

[http_service]
  internal_port = 8080
  force_https = false
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[env]
  TZ = "America/Sao_Paulo"

[mounts]
  source = "data"
  destination = "/app/data"

[processes]
  app = "python main.py"